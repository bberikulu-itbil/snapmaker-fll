name: CI checks

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify core files exist
        run: |
          test -s index.html
          test -s styles.css
          test -s script.js
          test -s README.md

      - name: Verify media assets
        run: |
          find media -type f -name '*.svg' -size +0 | grep -q .
          find media -type f -name '*.jpg' -size +0 | grep -q .

